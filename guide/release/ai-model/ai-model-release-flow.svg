<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="740" viewBox="0 0 1000 740" font-family="'Apple SD Gothic Neo','Noto Sans CJK KR','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9AA3AF"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="740" fill="#ffffff"/>

  <text x="500" y="46" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2937">AI 모델 공개 흐름</text>

  <!-- 1 -->
  <rect x="200" y="76" width="600" height="78" rx="12" fill="#FFF1F3" stroke="#EA002C" stroke-width="1.5"/>
  <circle cx="238" cy="115" r="16" fill="#EA002C"/>
  <text x="238" y="121" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">1</text>
  <text x="272" y="108" font-size="19" font-weight="bold" fill="#1F2937">내부 승인 · OSRB 검토 요청</text>
  <text x="272" y="134" font-size="14" fill="#6B7280">소속 조직 승인을 받고 OSRB(사내 오픈소스 검토 조직)에 요청</text>

  <line x1="500" y1="154" x2="500" y2="192" stroke="#9AA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 2 -->
  <rect x="200" y="196" width="600" height="78" rx="12" fill="#F4F6F8" stroke="#D8DEE6" stroke-width="1.5"/>
  <circle cx="238" cy="235" r="16" fill="#EA002C"/>
  <text x="238" y="241" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">2</text>
  <text x="272" y="228" font-size="19" font-weight="bold" fill="#1F2937">라이선스 확인</text>
  <text x="272" y="254" font-size="14" fill="#6B7280">모델 가중치 라이선스와 학습 데이터셋 라이선스를 따로 확인</text>

  <!-- split -->
  <line x1="500" y1="274" x2="500" y2="296" stroke="#9AA3AF" stroke-width="2"/>
  <path d="M340,296 L660,296" stroke="#9AA3AF" stroke-width="2" fill="none"/>
  <line x1="340" y1="296" x2="340" y2="330" stroke="#9AA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="660" y1="296" x2="660" y2="330" stroke="#9AA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- parallel bracket label -->
  <rect x="430" y="286" width="140" height="22" rx="11" fill="#F47725"/>
  <text x="500" y="302" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">3  동시에 진행</text>

  <!-- 3a -->
  <rect x="150" y="334" width="380" height="86" rx="12" fill="#FFF6EE" stroke="#F47725" stroke-width="1.5"/>
  <text x="176" y="366" font-size="18" font-weight="bold" fill="#1F2937">공개 전 체크리스트</text>
  <text x="176" y="392" font-size="14" fill="#6B7280">공개할 권리, 라이선스,</text>
  <text x="176" y="410" font-size="14" fill="#6B7280">데이터·민감정보 점검</text>

  <!-- 3b -->
  <rect x="530" y="334" width="380" height="86" rx="12" fill="#FFF6EE" stroke="#F47725" stroke-width="1.5"/>
  <text x="556" y="366" font-size="18" font-weight="bold" fill="#1F2937">모델 카드 작성</text>
  <text x="556" y="392" font-size="14" fill="#6B7280">README.md에 용도·한계·</text>
  <text x="556" y="410" font-size="14" fill="#6B7280">학습 데이터·평가 기록</text>

  <!-- merge -->
  <line x1="340" y1="420" x2="340" y2="442" stroke="#9AA3AF" stroke-width="2"/>
  <line x1="660" y1="420" x2="660" y2="442" stroke="#9AA3AF" stroke-width="2"/>
  <path d="M340,442 L660,442" stroke="#9AA3AF" stroke-width="2" fill="none"/>
  <line x1="500" y1="442" x2="500" y2="474" stroke="#9AA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 4 -->
  <rect x="200" y="478" width="600" height="78" rx="12" fill="#F4F6F8" stroke="#D8DEE6" stroke-width="1.5"/>
  <circle cx="238" cy="517" r="16" fill="#EA002C"/>
  <text x="238" y="523" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">4</text>
  <text x="272" y="510" font-size="19" font-weight="bold" fill="#1F2937">AI SBOM으로 문서화 점검</text>
  <text x="272" y="536" font-size="14" fill="#6B7280">BomLens로 빠진 항목을 확인하고 모델 카드를 보강 (반복)</text>

  <line x1="500" y1="556" x2="500" y2="594" stroke="#9AA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 5 -->
  <rect x="200" y="598" width="600" height="78" rx="12" fill="#FFF1F3" stroke="#EA002C" stroke-width="1.5"/>
  <circle cx="238" cy="637" r="16" fill="#EA002C"/>
  <text x="238" y="643" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">5</text>
  <text x="272" y="630" font-size="19" font-weight="bold" fill="#1F2937">저장소 공개 · 운영</text>
  <text x="272" y="656" font-size="14" fill="#6B7280">정리된 결과로 OSRB 검토를 마치고 공개한 뒤 운영</text>

  <text x="500" y="712" text-anchor="middle" font-size="13" fill="#9AA3AF">공통 절차(승인·민감정보 제거·이름·운영)는 오픈소스 공개 절차를 따르고, 이 그림은 모델이라서 달라지는 부분을 표시합니다.</text>
</svg>
