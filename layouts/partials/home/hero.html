{{/* 홈 히어로 — Vercel풍: 단색 배경 + 미세 그리드(다크는 상단 글로우) */}}
<section class="skt-hero">
  <div class="skt-hero__bg" aria-hidden="true"></div>
  <div class="skt-hero__inner">
    <h1 class="skt-hero__title">{{ .Params.hero_title | default .Title }}</h1>
    {{ with .Params.hero_subtitle }}
      <p class="skt-hero__subtitle">{{ . }}</p>
    {{ end }}
    <div class="skt-hero__actions">
      {{ with .Params.hero_cta_primary_text }}
        <a class="btn btn-lg btn-primary fw-semibold px-4" href="{{ $.Params.hero_cta_primary_url }}">
          {{ . }} <i class="fas fa-arrow-right ms-2"></i>
        </a>
      {{ end }}
      {{ with .Params.hero_cta_secondary_text }}
        <a class="btn btn-lg btn-outline-secondary fw-semibold px-4" href="{{ $.Params.hero_cta_secondary_url }}">
          {{ . }} <i class="fab fa-github ms-2"></i>
        </a>
      {{ end }}
    </div>
  </div>
</section>
