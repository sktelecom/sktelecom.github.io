<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="'Apple SD Gothic Neo','Noto Sans CJK KR','Malgun Gothic',sans-serif">
  <defs>
    <filter id="s1" x="-20%" y="-40%" width="140%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#111014" flood-opacity="0.09"/>
    </filter>
    <filter id="s2" x="-40%" y="-60%" width="180%" height="240%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#111014" flood-opacity="0.16"/>
    </filter>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9B96A0"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="#FFFFFF"/>

  <text x="500" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#1A1A1E" letter-spacing="-0.3">AI SBOM은 무엇을 만들고, 무엇을 사람이 판단하나</text>

  <text x="150" y="104" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="2.5" fill="#B0ABB2">입력</text>
  <text x="440" y="104" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="2.5" fill="#B0ABB2">도구</text>
  <text x="792" y="104" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="2.5" fill="#B0ABB2">산출물</text>

  <!-- input -->
  <g filter="url(#s1)"><rect x="52" y="126" width="196" height="96" rx="14" fill="#FFFFFF" stroke="#E6E3DF"/></g>
  <g stroke="#8C8890" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(74,150)">
    <path d="M2 1 h11 l5 5 v15 a1 1 0 0 1 -1 1 h-15 a1 1 0 0 1 -1 -1 z"/><path d="M13 1 v5 h5" stroke="#C7C2CA"/>
  </g>
  <text x="106" y="163" font-size="16" font-weight="650" fill="#1A1A1E">모델 카드</text>
  <text x="74" y="190" font-size="12.5" fill="#7C7880">저장소의 README.md</text>
  <text x="74" y="208" font-size="12" fill="#ABA6AE">가중치는 내려받지 않음</text>

  <line x1="248" y1="174" x2="336" y2="174" stroke="#C6C1C8" stroke-width="2" marker-end="url(#a)"/>

  <!-- tool: the single accent -->
  <g filter="url(#s2)"><rect x="340" y="138" width="200" height="72" rx="14" fill="#EA002C"/></g>
  <g transform="translate(366,163)" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round">
    <circle cx="9" cy="9" r="8"/><line x1="15" y1="15" x2="21" y2="21"/>
  </g>
  <text x="398" y="170" font-size="18" font-weight="700" fill="#FFFFFF">BomLens</text>
  <text x="398" y="192" font-size="12.5" fill="#F6C9D1">모델 카드를 읽어 자동 정리</text>

  <!-- fan-out -->
  <g stroke="#C6C1C8" stroke-width="2" fill="none">
    <line x1="540" y1="174" x2="584" y2="174"/>
    <path d="M584 134 V314"/>
    <line x1="584" y1="148" x2="616" y2="148" marker-end="url(#a)"/>
    <line x1="584" y1="200" x2="616" y2="200" marker-end="url(#a)"/>
    <line x1="584" y1="252" x2="616" y2="252" marker-end="url(#a)"/>
    <line x1="584" y1="304" x2="616" y2="304" marker-end="url(#a)"/>
  </g>

  <!-- outputs: neutral cards, structure not color -->
  <g font-size="14.5" font-weight="600" fill="#1A1A1E">
    <g filter="url(#s1)"><rect x="620" y="130" width="336" height="36" rx="9" fill="#FFFFFF" stroke="#E6E3DF"/></g>
    <text x="640" y="153">AI SBOM (ML-BOM, CycloneDX)</text>
    <g filter="url(#s1)"><rect x="620" y="182" width="336" height="36" rx="9" fill="#FFFFFF" stroke="#E6E3DF"/></g>
    <text x="640" y="205">G7 요소 충족도 · 빠진 항목 채우는 법</text>
    <g filter="url(#s1)"><rect x="620" y="234" width="336" height="36" rx="9" fill="#FFFFFF" stroke="#E6E3DF"/></g>
    <text x="640" y="257">규제 대응 정리 (EU · 국내)</text>
    <g filter="url(#s1)"><rect x="620" y="286" width="336" height="36" rx="9" fill="#FFFFFF" stroke="#E6E3DF"/></g>
    <text x="640" y="309">라이선스 검토가 필요한 항목 표시</text>
  </g>

  <!-- human zone: separated by structure + label, not color -->
  <rect x="52" y="366" width="896" height="192" rx="16" fill="#F7F6F4" stroke="#E6E3DF"/>
  <g transform="translate(74,388)" stroke="#5E5A62" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="8" cy="6" r="4"/><path d="M1 20 a7 7 0 0 1 14 0"/>
  </g>
  <text x="102" y="401" font-size="15.5" font-weight="700" fill="#2B2930">사람이 판단하는 영역 — 도구가 채울 수 없는 것</text>
  <line x1="74" y1="416" x2="926" y2="416" stroke="#E2DED9" stroke-width="1"/>

  <g>
    <g filter="url(#s1)"><rect x="74" y="434" width="274" height="104" rx="11" fill="#FFFFFF" stroke="#E6E3DF"/></g>
    <text x="96" y="464" font-size="15" font-weight="700" fill="#1A1A1E">검토 전용 13개 요소</text>
    <text x="96" y="489" font-size="12.5" fill="#7C7880">의도한 적용 분야, 학습 데이터 민감도</text>
    <text x="96" y="507" font-size="12.5" fill="#7C7880">등 — 모델 카드 필드로 증명되지 않음</text>

    <g filter="url(#s1)"><rect x="363" y="434" width="274" height="104" rx="11" fill="#FFFFFF" stroke="#E6E3DF"/></g>
    <text x="385" y="464" font-size="15" font-weight="700" fill="#1A1A1E">데이터셋 라이선스</text>
    <text x="385" y="489" font-size="12.5" fill="#7C7880">학습에 쓴 데이터의 재배포·상업</text>
    <text x="385" y="507" font-size="12.5" fill="#7C7880">이용 조건은 사람이 따로 확인</text>

    <g filter="url(#s1)"><rect x="652" y="434" width="274" height="104" rx="11" fill="#FFFFFF" stroke="#E6E3DF"/></g>
    <text x="674" y="464" font-size="15" font-weight="700" fill="#1A1A1E">개인정보 · 저작물</text>
    <text x="674" y="489" font-size="12.5" fill="#7C7880">학습 데이터에 개인정보나 타인의</text>
    <text x="674" y="507" font-size="12.5" fill="#7C7880">저작물이 섞였는지는 도구가 안 봄</text>
  </g>

  <text x="500" y="584" text-anchor="middle" font-size="12" fill="#ABA6AE">전체 판정은 SBOM 필수 형식 항목에서 갈리고, G7 요소는 모두 권고라 판정을 좌우하지 않습니다.</text>
</svg>
