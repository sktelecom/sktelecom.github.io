      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="720" fill="#ffffff"/>

  <g>
    <rect x="120" y="60" width="760" height="110" rx="12" fill="#cfe8c2" stroke="#7bbf6a"/>
